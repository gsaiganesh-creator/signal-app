  <circle cx="422" cy="79" r="71" stroke="#8B5CF6" stroke-width="11" opacity="0.7" fill="none"/>
  <!-- 6 orbs around ring -->
  <circle cx="422" cy="8"   r="10.8" fill="#8B5CF6" opacity="0.8"/>
  <circle cx="483" cy="43"  r="10.8" fill="#8B5CF6" opacity="0.8"/>
  <circle cx="483" cy="115" r="10.8" fill="#8B5CF6" opacity="0.8"/>
  <circle cx="422" cy="150" r="10.8" fill="#8B5CF6" opacity="0.8"/>
  <circle cx="361" cy="115" r="10.8" fill="#8B5CF6" opacity="0.8"/>
  <circle cx="361" cy="43"  r="10.8" fill="#8B5CF6" opacity="0.8"/>
  <!-- 4-point orange star at ring center -->
  <path d="M422 43 L430.9 70.1 L458 79 L430.9 87.9 L422 115 L413.1 87.9 L386 79 L413.1 70.1 Z" fill="#FF5C1A"/>
</svg>
