<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0E1628"/>
      <stop offset="100%" stop-color="#070D1A"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>
  <!-- Blue tint overlay matching opacity:0.2 -->
  <rect width="512" height="512" rx="96" fill="#1740F5" opacity="0.2"/>
  <!-- Rising chart line -->
  <polyline points="59,394 157,256 236,335 335,138 413,217 472,98"
    stroke="#4F6FFA" stroke-width="28" fill="none"
    stroke-linecap="round" stroke-linejoin="round"/>
