  <!-- ── S1 · Context + Theme + Nav + Shared ─────────────────── -->
  <script type="text/babel">
  const { createContext, useContext, useState, useEffect } = React;

  /* ── Palette ─────────────────────────────── */
  const ThemeCtx  = createContext({ dark:true, toggle:()=>{} });
  const NavCtx    = createContext({ screen:'welcome', navigate:()=>{}, goBack:()=>{} });
  const TweaksCtx = createContext({ blu:'#1740F5', org:'#FF5C1A', grn:'#00D4A0',
    buyLabel:'BUY', sellLabel:'SELL', signalLabel:'STRONG BUY',
    density:'Standard', isEssential:false, isPro:false, tradingMode:'Swing' });

  const DP = { bg:'#070D1A', surf:'#0E1628', surf2:'#162038', bdr:'#1C2E4A', txt:'#FFF', dim:'#7A8BAA', cg:'linear-gradient(145deg,#0D1E45,#0E1628)' };
  const LP = { bg:'#F2F6FF', surf:'#FFF', surf2:'#E8EEFF', bdr:'#CDD5F0', txt:'#0A1628', dim:'#5A6A8A', cg:'linear-gradient(145deg,#E8EEFF,#FFF)' };
  const A  = { blu:'#1740F5', bluL:'#4F6FFA', org:'#FF5C1A', orgL:'#FF7D46', grn:'#00D4A0', red:'#FF3B5C', ylw:'#FFB800', pur:'#8B5CF6' };
  const SAFE_TOP = 62;   /* iOS status-bar overlay height */
  const SAFE_BOT = 34;   /* home-indicator overlay height */

  function useTheme()    { const {dark}=useContext(ThemeCtx); return {T:dark?DP:LP, dark, A}; }
  function useNav()      { return useContext(NavCtx); }
  function useTk()       { return useContext(TweaksCtx); }  /* trading tweaks */

  function AppProviders({ children }) {
    const [dark,  setDark]  = useState(()=>{ try{return localStorage.getItem('sp_t')!=='light';}catch{return true;} });
    const [stack, setStack] = useState(['welcome']);
    const screen   = stack[stack.length-1];
    const navigate = s => setStack(p=>[...p,s]);
    const goBack   = () => setStack(p=>p.length>1?p.slice(0,-1):p);
    const toggle   = () => setDark(d=>{ const n=!d; try{localStorage.setItem('sp_t',n?'dark':'light');}catch{} return n; });
    return (
      <ThemeCtx.Provider value={{dark,toggle}}>
        <NavCtx.Provider value={{screen,navigate,goBack}}>{children}</NavCtx.Provider>
      </ThemeCtx.Provider>
    );
  }

  /* NavBar — fixed safe-area inset + inline theme toggle (top-right) */
  function NavBar({ title='', back=true }) {
    const {goBack}=useNav(); const {T,dark}=useTheme(); const {toggle}=useContext(ThemeCtx);
    return (
      <div style={{ paddingTop:SAFE_TOP, paddingLeft:16, paddingRight:14, paddingBottom:8,
        display:'flex', alignItems:'center', gap:10, flexShrink:0 }}>
        {back && <div onClick={goBack} style={{width:32,height:32,borderRadius:9,background:T.surf2,
          display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,color:T.txt,cursor:'pointer',flexShrink:0}}>‹</div>}
        {title && <span style={{fontSize:17,fontWeight:700,color:T.txt,flex:1}}>{title}</span>}
        <button onClick={toggle} style={{width:32,height:32,borderRadius:16,background:dark?'rgba(255,255,255,0.11)':'rgba(0,0,0,0.07)',
          border:`1px solid ${T.bdr}`,fontSize:14,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
          {dark?'☀️':'🌙'}
        </button>
      </div>
    );
  }

  /* Micro components */
  function Spark({ data=[], color=A.blu, w=80, h=26 }) {
    const mx=Math.max(...data),mn=Math.min(...data),r=mx-mn||1;
    const pts=data.map((v,i)=>`${(i/(data.length-1))*w},${h-2-((v-mn)/r)*(h-4)}`).join(' ');
    return <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{display:'block'}}><polyline points={pts} fill="none" stroke={color} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>;
  }
  function PBar({ val, max=100, color=A.grn, h=5 }) {
    const {T}=useTheme();
    return <div style={{height:h,borderRadius:h,background:T.bdr,overflow:'hidden'}}><div style={{height:'100%',width:`${(val/max)*100}%`,borderRadius:h,background:color}}/></div>;
  }
  function BigBtn({ label, onClick, orange=false, outline=false }) {
    const {T}=useTheme(); const tk=useTk();
    const bg = outline ? T.surf : orange
      ? `linear-gradient(135deg,${tk.org},${tk.org}CC)`
      : `linear-gradient(135deg,${tk.blu},${tk.blu}BB)`;
    return <button onClick={onClick} style={{width:'100%',height:50,borderRadius:14,border:outline?`1px solid ${T.bdr}`:'none',
      background:bg,color:outline?T.txt:'#fff',fontSize:15,fontWeight:700,cursor:'pointer',
      boxShadow:outline?'none':orange?`0 5px 18px ${tk.org}55`:`0 5px 18px ${tk.blu}55`}}>{label}</button>;
  }

  Object.assign(window, { ThemeCtx, NavCtx, TweaksCtx, DP, LP, A, SAFE_TOP, SAFE_BOT,
    useTheme, useNav, useTk, AppProviders, NavBar, Spark, PBar, BigBtn });
  </script>

      {i:'🤖',title:'EXIT Signal — ZOMATO',body:'RSI overbought at 74. Profit-taking zone ₹195–200.',t:'3h',read:true,c:A.red,tag:'ML Signal'},
      {i:'𝕏', title:'FII Alert — NIFTY 50',body:'FII net bought ₹2,840Cr today. Broad market positive.',t:'4h',read:true,c:tk.grn,tag:'Sentiment'},
      {i:'🌐',title:'Pre-Market Global Cues',body:'S&P500 +0.42%. Nikkei -0.18%. Crude -0.9%. Positive open.',t:'8h',read:true,c:tk.blu,tag:'Global'},
      {i:'📊',title:'INFY — Earnings Beat',body:'Infosys Q4 PAT ₹7,969Cr — beat by 6%. Stock up 2.2% pre-market.',t:'1d',read:true,c:A.ylw,tag:'Earnings'},
    ];
    const cats=['All','ML Signal','Sentiment','Earnings','Circuit','Global'];
    const list=flt==='All'?alerts:alerts.filter(a=>a.tag===flt);
    const unread=alerts.filter(a=>!a.read).length;
    return (
      <div style={{width:'100%',height:'100%',background:T.bg,display:'flex',flexDirection:'column',paddingBottom:52+SAFE_BOT}}>
        <div style={{padding:`${SAFE_TOP}px 16px 8px`,flexShrink:0}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:10}}>
            <div style={{display:'flex',alignItems:'center',gap:9}}>
              <div onClick={goBack} style={{width:30,height:30,borderRadius:8,background:T.surf2,display:'flex',alignItems:'center',justifyContent:'center',fontSize:18,color:T.txt,cursor:'pointer'}}>‹</div>
              <div style={{fontSize:22,fontWeight:800,color:T.txt}}>Alerts</div>
              {unread>0&&<div style={{minWidth:20,height:20,borderRadius:10,background:A.red,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:800,color:'#fff',padding:'0 5px'}}>{unread}</div>}
            </div>
            <span style={{fontSize:12,color:tk.blu,fontWeight:600,cursor:'pointer'}}>Mark all read</span>
          </div>
          <div style={{display:'flex',gap:6,overflowX:'auto',paddingBottom:3}}>
            {cats.map(c=>(
              <div key={c} onClick={()=>setFlt(c)} style={{flexShrink:0,padding:'5px 11px',borderRadius:20,
                background:flt===c?tk.blu:T.surf,border:`1px solid ${flt===c?tk.blu:T.bdr}`,
                color:flt===c?'#fff':T.dim,fontSize:11.5,fontWeight:flt===c?700:500,cursor:'pointer'}}>{c}</div>
            ))}
          </div>
        </div>
        <div style={{flex:1,overflow:'auto',padding:'4px 14px 10px',display:'flex',flexDirection:'column',gap:8}}>
          {list.map((a,i)=>(
            <div key={i} style={{padding:'11px 13px',borderRadius:14,
              background:a.read?T.surf:`${a.c}08`,border:`1px solid ${a.read?T.bdr:`${a.c}30`}`,
              display:'flex',gap:12,alignItems:'flex-start',position:'relative'}}>
              {!a.read&&<div style={{position:'absolute',top:13,right:13,width:7,height:7,borderRadius:4,background:a.c}}/>}
              <div style={{width:38,height:38,borderRadius:11,background:`${a.c}18`,border:`1px solid ${a.c}30`,
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:17,flexShrink:0}}>{a.i}</div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:4,flexWrap:'wrap'}}>
                  <span style={{fontSize:13,fontWeight:700,color:T.txt}}>{a.title}</span>
                </div>
                <span style={{fontSize:10,fontWeight:700,padding:'2px 7px',borderRadius:5,
                  background:`${a.c}18`,color:a.c,marginBottom:5,display:'inline-block'}}>{a.tag}</span>
                <div style={{fontSize:12,color:T.dim,lineHeight:1.45,marginTop:2}}>{a.body}</div>
                <div style={{fontSize:10.5,color:T.dim,marginTop:5}}>{a.t} ago</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  Object.assign(window, { P04b_Preferences, P15_Signals, P17_Subscription, P18_Markets, P19_TradeHistory, P20_Notifications });
  </script>

  <!-- ── S6 · New Screens: Multi-Portfolio + Ace Investors ──────── -->
  <script type="text/babel" src="screens-new.jsx"></script>

  <!-- ── S4 · App Shell + Tweaks + Router ─────────────────────── -->
  <script type="text/babel">
  const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
    "tradingMode": "Swing",
    "skin": [
      "#00875A",
      "#FF5C1A",
      "#06D6A0"
    ],
    "density": "Standard"
  }/*EDITMODE-END*/;

  const MAIN = ['analysis','dashboard','stock-detail','algo-hub','param-explorer','algo-builder','code-gen','deploy','signals','markets','subscription','history','notifications','my-portfolios','top-investors','investor-detail'];
  const TAB_ACTIVE = { dashboard:0,'stock-detail':0,analysis:0,history:0,notifications:0,'my-portfolios':0, markets:1,'top-investors':1,'investor-detail':1, signals:2,'algo-hub':3,'param-explorer':3,'algo-builder':3,'code-gen':3,deploy:3, subscription:4 };
  const TABS = [{id:'dashboard',icon:'📊',label:'Portfolio'},{id:'markets',icon:'🌐',label:'Markets'},{id:'signals',icon:'🚀',label:'Signals'},{id:'algo-hub',icon:'⚙️',label:'Algo'},{id:'subscription',icon:'👤',label:'Profile'}];

  function TabBar() {
    const {screen,navigate}=useNav(); const {T,A}=useTheme(); const tk=useTk();
    if (!MAIN.includes(screen)) return null;
    const at = TAB_ACTIVE[screen] ?? 0;
    return (
      <div style={{height:52,background:T.surf,borderTop:`1px solid ${T.bdr}`,display:'flex',alignItems:'center',flexShrink:0}}>
        {TABS.map((t,i)=>(
          <div key={t.id} onClick={()=>navigate(t.id)} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:2,cursor:'pointer',padding:'5px 0'}}>
            <span style={{fontSize:19}}>{t.icon}</span>
            <span style={{fontSize:10,fontWeight:i===at?700:500,color:i===at?tk.blu:T.dim}}>{t.label}</span>
          </div>
        ))}
      </div>
    );
  }

  const SCREEN_MAP = {
    welcome:P01_Welcome, signup:P02_SignUp, verify:P03_Verify,
    preferences:P04b_Preferences,
    broker:P04_BrokerConnect, excel:P05_ExcelUpload, analyzing:P06_Analyzing,
    analysis:P07_Analysis, dashboard:P08_Dashboard, 'stock-detail':P09_StockDetail,
    'algo-hub':P10_AlgoHub, 'param-explorer':P11_ParamExplorer,
    'algo-builder':P12_AlgoBuilder, 'code-gen':P13_CodeGen, deploy:P14_Deploy,
    signals:P15_Signals, markets:P18_Markets, subscription:P17_Subscription,
    history:P19_TradeHistory, notifications:P20_Notifications,
    settings:P17_Subscription,
    'my-portfolios':P_MultiPortfolio, 'top-investors':P_TopInvestors, 'investor-detail':P_InvestorDetail,
  };

  function Router() {
    const {screen}=useNav();
    const Screen = SCREEN_MAP[screen] || P01_Welcome;
    return (
      <div style={{width:'100%',height:'100%',display:'flex',flexDirection:'column',overflow:'hidden'}}>
        <div key={screen} className="si" style={{flex:1,overflow:'hidden',display:'flex',flexDirection:'column',minHeight:0}}>
          <Screen/>
        </div>
        <TabBar/>
      </div>
    );
  }

  function DeviceShell({ children }) {
    const { dark } = React.useContext(ThemeCtx);
    const [scale, setScale] = React.useState(1);
    React.useEffect(() => {
      const PHONE_W = 402, PHONE_H = 874;
      const calc = () => setScale(
        Math.min(window.innerWidth / PHONE_W, window.innerHeight / PHONE_H) * 0.97
      );
      calc();
      window.addEventListener('resize', calc);
      return () => window.removeEventListener('resize', calc);
    }, []);
    return (
      <div style={{ transform:`scale(${scale})`, transformOrigin:'center center', lineHeight:'normal', flexShrink:0 }}>
        <IOSDevice dark={dark}>{children}</IOSDevice>
      </div>
    );
  }

  function App() {
    const [t, setTweak] = useTweaks(TWEAK_DEFAULTS);

    /* Resolve tweaks → trading context */
    const skin = Array.isArray(t.skin) ? t.skin : TWEAK_DEFAULTS.skin;
    const mode = t.tradingMode || 'Swing';
    const density = t.density || 'Standard';
    const labels = {
      Scalper:  { buy:'ENTRY NOW', sell:'EXIT NOW',  sig:'SCALP!' },
      Swing:    { buy:'BUY',       sell:'SELL',       sig:'STRONG BUY' },
      Investor: { buy:'ACCUMULATE',sell:'REDUCE',     sig:'CONVICTION' },
    };
    const lb = labels[mode] || labels.Swing;
    const tkVal = {
      blu: skin[0], org: skin[1], grn: skin[2],
      buyLabel: lb.buy, sellLabel: lb.sell, signalLabel: lb.sig,
      density, isEssential: density==='Essential', isPro: density==='Pro',
      tradingMode: mode,
      setPrefs: (newMode, newDensity) => {
        setTweak('tradingMode', newMode);
        setTweak('density', newDensity);
      },
    };

    return (
      <AppProviders>
        <TweaksCtx.Provider value={tkVal}>
          <div style={{width:'100vw',height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',background:'#0A0A12',overflow:'hidden'}}>
            <DeviceShell><Router/></DeviceShell>
          </div>
          <TweaksPanel>
            <TweakSection label="How do you trade?"/>
            <TweakRadio label="Trading style" value={t.tradingMode}
              options={['Scalper','Swing','Investor']}
              onChange={v=>setTweak('tradingMode',v)}/>
            <TweakSection label="How much do you want to see?"/>
            <TweakRadio label="Layout" value={t.density}
              options={['Essential','Standard','Pro']}
              onChange={v=>setTweak('density',v)}/>
            <TweakSection label="Your colour theme"/>
            <TweakColor label="Accent palette" value={t.skin}
              options={[
                ['#1740F5','#FF5C1A','#00D4A0'],
                ['#6C3DE0','#FF8C42','#00D4A0'],
                ['#00875A','#FF5C1A','#06D6A0'],
                ['#E63946','#FF8C00','#00C2A0'],
              ]}
              onChange={v=>setTweak('skin',v)}/>
          </TweaksPanel>
        </TweaksCtx.Provider>
      </AppProviders>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
